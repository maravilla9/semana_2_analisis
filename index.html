<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕵️ Detective del Contenido - Semana 2</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0c0a1f, #1a0033);
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 15px;
    }
    header {
        text-align: center;
        margin-bottom: 20px;
    }
    .logo {
        max-width: 180px;
        margin-bottom: 8px;
    }
    h1 {
        font-size: 36px;
        color: #00f0ff;
        text-shadow: 0 0 15px #00f0ff;
    }
    .subtitle {
        font-size: 22px;
        color: #b0b0ff;
    }

    .game-container {
        width: 100%;
        max-width: 820px;
        background: rgba(15, 18, 45, 0.95);
        border: 3px solid #00f0ff;
        border-radius: 25px;
        padding: 35px 25px;
        box-shadow: 0 0 60px rgba(0, 240, 255, 0.4);
        position: relative;
    }
    .progress-container {
        margin-bottom: 30px;
        text-align: center;
    }
    .step {
        font-size: 20px;
        margin-bottom: 10px;
        color: #ddd;
    }
    .progress {
        height: 14px;
        background: #222244;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #00f0ff33;
    }
    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #00f0ff, #9d00ff);
        width: 20%;
        transition: width 0.6s ease;
        box-shadow: 0 0 12px #00f0ff;
    }

    .question {
        font-size: 28px;
        text-align: center;
        margin: 35px 0;
        line-height: 1.3;
        color: #ffffff;
    }
    .options {
        display: grid;
        gap: 16px;
    }
    .option-btn {
        padding: 20px 25px;
        font-size: 19px;
        background: rgba(30, 35, 70, 0.9);
        border: 2px solid #445588;
        border-radius: 16px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
        text-align: left;
    }
    .option-btn:hover {
        background: rgba(0, 240, 255, 0.15);
        border-color: #00f0ff;
        transform: translateY(-4px);
    }

    .feedback {
        margin-top: 25px;
        padding: 25px;
        border-radius: 16px;
        font-size: 20px;
        line-height: 1.5;
        display: none;
    }
    .correct { background: rgba(0, 200, 100, 0.25); border: 2px solid #00ffaa; }
    .wrong  { background: rgba(220, 50, 50, 0.25); border: 2px solid #ff6666; }

    .result-screen {
        text-align: center;
        display: none;
    }
    .score {
        font-size: 52px;
        margin: 25px 0;
        color: #00f0ff;
        text-shadow: 0 0 20px #00f0ff;
    }
    .copy-btn {
        background: linear-gradient(90deg, #00cc88, #00ffaa);
        color: #000;
        font-weight: bold;
        border: none;
        padding: 18px 45px;
        font-size: 20px;
        border-radius: 50px;
        cursor: pointer;
        margin-top: 20px;
    }

    footer {
        margin-top: 40px;
        text-align: center;
        font-size: 15px;
        color: #888;
    }
</style>
</head>
<body>

<header>
    <img src="https://postimg.cc/LJc7x94j" alt="Logo Utel" class="logo">
    <h1>🕵️ Detective del Contenido</h1>
    <div class="subtitle">Semana 2 — Análisis de Contenido</div>
</header>

<div class="game-container">
    <div class="progress-container">
        <div class="step">Paso <span id="current-step">1</span> de 5</div>
        <div class="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div id="game-screen">
        <div class="question" id="question-text"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div id="result-screen" class="result-screen">
        <h1>¡Misión Completada!</h1>
        <div class="score" id="final-score"></div>
        <p id="final-message" style="font-size:22px;"></p>
        <button class="copy-btn" onclick="copyResult()">📋 Copiar resultado para compartir</button>
    </div>
</div>

<footer>
    Universidad Utel — Dr. Armando Sandoval Maravilla
</footer>

<script>
// ====== REEMPLAZA ESTAS PREGUNTAS CON LAS TUYAS ======
const questions = [
    {
        q: "¿Qué es la propaganda?",
        options: ["Información neutral y objetiva", "Mensaje diseñado para influir en opiniones o conductas", "Solo anuncios de productos", "Noticias verificadas"],
        correct: 1,
        explanation: "La propaganda es un mensaje intencional creado para persuadir o manipular las opiniones y conductas del público."
    },
    // ← Agrega aquí las preguntas 2, 3, 4 y 5
    { q: "Pregunta 2", options: ["A","B","C","D"], correct: 0, explanation: "Explicación aquí." },
    { q: "Pregunta 3", options: ["A","B","C","D"], correct: 0, explanation: "Explicación aquí." },
    { q: "Pregunta 4", options: ["A","B","C","D"], correct: 0, explanation: "Explicación aquí." },
    { q: "Pregunta 5", options: ["A","B","C","D"], correct: 0, explanation: "Explicación aquí." }
];

let current = 0;
let score = 0;

function loadQuestion() {
    const q = questions[current];
    document.getElementById("question-text").textContent = q.q;
    document.getElementById("current-step").textContent = current + 1;
    document.getElementById("progress-bar").style.width = ((current + 1) / 5 * 100) + "%";

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(i);
        optionsDiv.appendChild(btn);
    });

    document.getElementById("feedback").style.display = "none";
}

function checkAnswer(selected) {
    const q = questions[current];
    const feedback = document.getElementById("feedback");
    const buttons = document.querySelectorAll(".option-btn");
    buttons.forEach(b => b.disabled = true);

    if (selected === q.correct) {
        score++;
        feedback.className = "feedback correct";
        feedback.innerHTML = "✅ ¡Correcto!";
    } else {
        feedback.className = "feedback wrong";
        feedback.innerHTML = `❌ Incorrecto.<br><strong>Por qué:</strong> ${q.explanation}`;
    }
    feedback.style.display = "block";

    setTimeout(() => {
        current++;
        if (current < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }, 2800);
}

function showResult() {
    document.getElementById("game-screen").style.display = "none";
    document.getElementById("result-screen").style.display = "block";

    const percent = Math.round((score / 5) * 100);
    document.getElementById("final-score").textContent = `${score}/5 (${percent}%)`;

    let msg = score === 5 ? "¡Eres un Maestro Detective del Contenido!" : 
              score >= 3 ? "¡Muy bien! Sigue desarrollando tu pensamiento crítico." : 
              "Puedes mejorar. Revisa los conceptos y vuelve a intentarlo.";
    document.getElementById("final-message").textContent = msg;
}

function copyResult() {
    const percent = Math.round((score / 5) * 100);
    const text = `Obtuve ${score}/5 (${percent}%) en Detective del Contenido - Semana 2 🎯`;
    navigator.clipboard.writeText(text).then(() => {
        alert("✅ Resultado copiado al portapapeles");
    });
}

loadQuestion();
</script>
</body>
</html>
