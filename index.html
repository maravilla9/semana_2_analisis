<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕵️ Detective del Contenido - Semana 2</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1a0f35, #0f1b4a);
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 15px;
    }
    header {
        text-align: center;
        margin-bottom: 20px;
    }
    .logo {
        max-width: 150px;
        height: auto;
        margin-bottom: 10px;
        filter: drop-shadow(0 0 10px #00ffaa);
    }
    h1 {
        font-size: 28px;
        color: #00f0ff;
        text-shadow: 0 0 15px #00f0ff;
    }
    .subtitle {
        font-size: 18px;
        color: #a0d8ff;
    }
    .legend {
        font-size: 14px;
        color: #ccc;
        margin-top: 8px;
    }

    .game-container {
        width: 100%;
        max-width: 600px;
        background: rgba(20, 25, 60, 0.92);
        border: 2px solid #00f0ff;
        border-radius: 20px;
        padding: 25px 20px;
        box-shadow: 0 0 40px rgba(0, 240, 255, 0.4);
    }
    .progress-container {
        margin-bottom: 20px;
        text-align: center;
    }
    .step {
        font-size: 18px;
        margin-bottom: 8px;
        color: #ddd;
    }
    .progress {
        height: 12px;
        background: #112244;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #00f0ff44;
    }
    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #00f0ff, #9d00ff, #ff00cc);
        width: 20%;
        transition: width 0.6s ease;
        box-shadow: 0 0 10px #00f0ff;
    }

    .question {
        font-size: 22px;
        text-align: center;
        margin: 25px 0;
        line-height: 1.3;
    }
    .options {
        display: grid;
        gap: 12px;
    }
    .option-btn {
        padding: 14px 18px;
        font-size: 16px;
        background: rgba(35, 45, 90, 0.9);
        border: 2px solid #5566aa;
        border-radius: 14px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
    }
    .option-btn:hover {
        background: rgba(0, 240, 255, 0.2);
        border-color: #00f0ff;
        transform: translateY(-3px);
    }

    .feedback {
        margin-top: 20px;
        padding: 18px;
        border-radius: 14px;
        font-size: 16px;
        line-height: 1.4;
        display: none;
    }
    .correct { background: rgba(0, 220, 100, 0.3); border: 2px solid #00ff88; }
    .wrong  { background: rgba(240, 60, 60, 0.3); border: 2px solid #ff6666; }

    .result-screen {
        text-align: center;
        display: none;
    }
    .score {
        font-size: 36px;
        margin: 15px 0;
        color: #00f0ff;
        text-shadow: 0 0 20px #00f0ff;
    }
    .copy-btn {
        background: linear-gradient(90deg, #00ffaa, #00cc77);
        color: #000;
        font-weight: bold;
        border: none;
        padding: 12px 30px;
        font-size: 16px;
        border-radius: 30px;
        cursor: pointer;
        margin: 10px 5px;
    }

    footer {
        margin-top: 30px;
        text-align: center;
        font-size: 13px;
        color: #aaa;
    }

    @media (max-width: 600px) {
        h1 { font-size: 24px; }
        .question { font-size: 18px; }
        .option-btn { font-size: 14px; padding: 10px; }
        .score { font-size: 28px; }
    }
</style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="Logo Utel" class="logo">
    <h1>🕵️ Detective del Contenido</h1>
    <div class="subtitle">Semana 2 — Análisis de Contenido</div>
    <p class="legend">Este juego busca que reflexiones sobre cómo se construyen los mensajes y desarrolles pensamiento crítico.</p>
</header>

<div class="game-container">
    <div class="progress-container">
        <div class="step">Paso <span id="current-step">1</span> de 5</div>
        <div class="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div id="game-screen">
        <div class="question" id="question-text"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div id="result-screen" class="result-screen">
        <h1>¡Misión Completada! 🎉</h1>
        <div class="score" id="final-score"></div>
        <p id="final-message" style="font-size:18px;"></p>
        <button class="copy-btn" onclick="copyResult()">📋 Copiar resultado</button>
        <button class="copy-btn" onclick="shareWhatsApp()">📲 WhatsApp</button>
        <button class="copy-btn" onclick="shareFacebook()">📘 Facebook</button>
    </div>
</div>

<footer>
    Universidad Utel — Dr. Armando Sandoval Maravilla
</footer>

    });

    document.getElementById("feedback").style.display = "none";
}
