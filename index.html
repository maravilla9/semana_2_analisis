<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕵️ Detective del Contenido</title>
<style>
    :root {
        --neon: #00f0ff;
        --purple: #9d00ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0a0e1a, #1a0033);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
    }
    .game-container {
        width: 100%;
        max-width: 900px;
        background: rgba(20, 25, 50, 0.85);
        border: 2px solid var(--neon);
        border-radius: 25px;
        padding: 30px;
        box-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
        backdrop-filter: blur(10px);
    }
    .progress {
        height: 12px;
        background: #222;
        border-radius: 10px;
        margin-bottom: 25px;
        overflow: hidden;
    }
    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--neon), var(--purple));
        width: 20%;
        transition: width 0.4s ease;
    }
    .step { text-align: center; margin-bottom: 10px; font-size: 18px; }
    
    .question {
        font-size: 26px;
        margin: 25px 0;
        text-align: center;
        line-height: 1.3;
    }
    .options {
        display: grid;
        gap: 15px;
        margin-top: 30px;
    }
    button {
        padding: 18px;
        font-size: 19px;
        background: rgba(255,255,255,0.1);
        border: 2px solid #444;
        border-radius: 15px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
    }
    button:hover {
        background: rgba(0, 240, 255, 0.2);
        border-color: var(--neon);
        transform: translateY(-3px);
    }
    .feedback {
        margin-top: 25px;
        padding: 20px;
        border-radius: 15px;
        font-size: 20px;
        min-height: 80px;
    }
    .correct { background: rgba(0, 200, 83, 0.2); border: 2px solid #00c853; }
    .wrong { background: rgba(255, 50, 50, 0.2); border: 2px solid #ff3333; }

    .result {
        text-align: center;
        font-size: 32px;
        margin: 30px 0;
    }
    .share-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
    }
    .share-btn {
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 50px;
        text-decoration: none;
        color: white;
    }
    .whatsapp { background: #25D366; }
    .facebook { background: #1877F2; }
</style>
</head>
<body>

<div class="game-container">
    <div class="step" id="step">Paso <span id="current">1</span> de 5</div>
    <div class="progress"><div class="progress-bar" id="progress"></div></div>

    <div id="question-container">
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback" style="display:none;"></div>
    </div>

    <div id="result-screen" style="display:none;">
        <h1>¡Misión Completada!</h1>
        <div class="result" id="final-score"></div>
        <p id="message"></p>
        
        <div class="share-buttons">
            <a href="#" id="whatsapp" class="share-btn whatsapp" target="_blank">📱 Compartir en WhatsApp</a>
            <a href="#" id="facebook" class="share-btn facebook" target="_blank">📘 Compartir en Facebook</a>
        </div>
        <button onclick="restartGame()" style="margin-top:30px; padding:15px 40px; font-size:18px;">Jugar de nuevo</button>
    </div>
</div>

<script>
// ================== CONFIGURA TUS 5 PREGUNTAS AQUÍ ==================
const questions = [
    {
        q: "1. ¿Qué es la propaganda?",
        options: ["Información completamente objetiva", "Mensaje diseñado para influir en opiniones o conductas", "Solo anuncios de productos", "Noticias verificadas"],
        correct: 1,
        explanation: "La propaganda es un mensaje intencional para persuadir o manipular emociones y opiniones, no necesariamente objetivo."
    },
    {
        q: "2. ¿Cuál es un indicio claro de fake news?",
        options: ["Tiene muchas reacciones", "No cita fuentes confiables y genera emociones fuertes", "Está en un periódico digital", "Tiene buena ortografía"],
        correct: 1,
        explanation: "Las fake news suelen usar emociones extremas y carecen de fuentes verificables."
    },
    // Agrega aquí las preguntas 3, 4 y 5 con el mismo formato
    {
        q: "3. ¿Qué significa 'cherry picking' en análisis de contenido?",
        options: ["Elegir solo la información que favorece tu argumento", "Publicar fotos de cerezas", "Un tipo de publicidad", "Analizar todo el contexto"],
        correct: 0,
        explanation: "Cherry picking es seleccionar solo los datos que apoyan tu punto de vista ignorando el resto."
    },
    {
        q: "4. En un anuncio, ¿qué técnica usa una celebridad para vender un producto?",
        options: ["Testimonio", "Transferencia", "Bandwagon", "Glittering generalities"],
        correct: 0,
        explanation: "Usar a una celebridad es la técnica de Testimonio."
    },
    {
        q: "5. ¿Qué es más importante al analizar una imagen digital?",
        options: ["Solo el texto que tiene", "El contexto, autor, propósito y posibles manipulaciones", "Que sea bonita", "El número de likes"],
        correct: 1,
        explanation: "Siempre hay que analizar el contexto completo y posibles manipulaciones de la imagen."
    }
];

let currentQuestion = 0;
let score = 0;

function loadQuestion() {
    const q = questions[currentQuestion];
    document.getElementById("question").textContent = q.q;
    document.getElementById("current").textContent = currentQuestion + 1;
    document.getElementById("progress").style.width = ((currentQuestion + 1) / 5 * 100) + "%";

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = () => selectAnswer(index);
        optionsDiv.appendChild(btn);
    });

    document.getElementById("feedback").style.display = "none";
}

function selectAnswer(selected) {
    const q = questions[currentQuestion];
    const feedback = document.getElementById("feedback");
    const buttons = document.querySelectorAll(".options button");

    buttons.forEach(btn => btn.disabled = true);

    if (selected === q.correct) {
        score++;
        feedback.className = "feedback correct";
        feedback.innerHTML = "✅ ¡Correcto!";
    } else {
        feedback.className = "feedback wrong";
        feedback.innerHTML = `❌ Incorrecto.<br><strong>Explicación:</strong> ${q.explanation}`;
    }

    feedback.style.display = "block";

    setTimeout(() => {
        currentQuestion++;
        if (currentQuestion < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }, 2800);
}

function showResults() {
    document.getElementById("question-container").style.display = "none";
    document.getElementById("result-screen").style.display = "block";

    const percentage = Math.round((score / 5) * 100);
    document.getElementById("final-score").textContent = `${score}/5 (${percentage}%)`;

    let msg = "";
    if (score === 5) msg = "¡Eres un Maestro Detective del Contenido! 🏆";
    else if (score >= 3) msg = "¡Buen trabajo! Sigue afilando tus habilidades.";
    else msg = "Revisa los conceptos y vuelve a intentarlo. ¡Puedes mejorar!";

    document.getElementById("message").textContent = msg;

    // Enlaces de compartir
    const text = `Obtuve ${score}/5 en el juego Detective del Contenido de la Utel. ¿Te atreves a intentarlo?`;
    document.getElementById("whatsapp").href = `https://wa.me/?text=${encodeURIComponent(text + " https://tu-enlace-aqui")}`;
    document.getElementById("facebook").href = `https://www.facebook.com/sharer/sharer.php?u=https://tu-enlace-aqui&quote=${encodeURIComponent(text)}`;
}

function restartGame() {
    currentQuestion = 0;
    score = 0;
    document.getElementById("question-container").style.display = "block";
    document.getElementById("result-screen").style.display = "none";
    loadQuestion();
}

// Iniciar el juego
loadQuestion();
</script>
</body>
</html>
