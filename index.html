<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana 2: Análisis de Contenido</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; text-align: center; }
        .container { width: 95%; max-width: 500px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .logo { width: 200px; margin-bottom: 10px; }
        
        /* Tarjeta de Resultado */
        #resultado-card { display: none; background: #e7f3ff; border: 2px solid #007bff; border-radius: 12px; padding: 20px; margin-top: 20px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .frase { font-size: 1.2rem; font-weight: bold; color: #0056b3; margin: 15px 0; font-style: italic; }
        
        /* Botones */
        .btn-jugar { background: #007bff; color: white; padding: 15px 30px; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-compartir { display: flex; justify-content: space-around; margin-top: 20px; flex-wrap: wrap; }
        .social-btn { padding: 10px 15px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 0.9rem; margin: 5px; flex-grow: 1; }
        .whatsapp { background: #25d366; }
        .facebook { background: #1877f2; }

        footer { margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="Universidad Utel" class="logo">
    <h2>Semana 2: Análisis de Contenido</h2>
    
    <p>¡Bienvenido al reto interactivo!</p>
    
    <div id="seccion-juego">
        <button class="btn-jugar" onclick="mostrarResultado()">¡Haz clic aquí al terminar de jugar!</button>
    </div>

    <div id="resultado-card">
        <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" width="60" alt="Check">
        <h3>¡Gracias por jugar!</h3>
        <p>Espero que te hayas divertido analizando mensajes y tecnología.</p>
        
        <div class="frase" id="frase-motivacional"></div>
        
        <p>Comparte tu logro con tus amigos y familia:</p>
        <div class="btn-compartir">
            <a id="share-wa" href="#" class="social-btn whatsapp">WhatsApp</a>
            <a id="share-fb" href="#" class="social-btn facebook">Facebook</a>
        </div>
        
        <button onclick="mostrarResultado()" style="margin-top:15px; background:none; border:none; color:#007bff; cursor:pointer; text-decoration:underline;">Volver a jugar para otra frase</button>
    </div>

    <footer>
        <p><strong>Universidad Utel</strong></p>
        <p>Dr. Armando Sandoval Maravilla</p>
    </footer>
</div>

<script>
    const frases = [
        "¡Tu capacidad de análisis no tiene límites!",
        "La comunicación es el arma más poderosa, ¡y hoy la dominaste!",
        "¡Excelente trabajo! Sigue explorando el mundo de los datos.",
        "¡Felicidades! Tu visión crítica es clave para el éxito profesional.",
        "¡Dominas la tecnología de la comunicación como un experto!"
    ];

    function mostrarResultado() {
        // Seleccionar frase aleatoria
        const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];
        document.getElementById('frase-motivacional').innerText = `"${fraseAleatoria}"`;
        
        // Mostrar la tarjeta
        document.getElementById('resultado-card').style.display = 'block';
        document.getElementById('seccion-juego').style.display = 'none';

        // Configurar enlaces de compartir
        const textoCompartir = encodeURIComponent("¡Acabo de completar mi reto de Análisis de Contenido en la Semana 2! " + fraseAleatoria);
        const urlPagina = encodeURIComponent(window.location.href);

        document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${textoCompartir}`;
        document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${urlPagina}`;
    }
</script>

</body>
</html>
