<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕵️ Detective del Contenido</title>
<style>
    :root {
        --neon: #00f0ff;
        --purple: #9d00ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0a0e1a, #1a0033);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
    }
    .game-container {
        width: 100%;
        max-width: 850px;
        background: rgba(15, 20, 45, 0.95);
        border: 2px solid var(--neon);
        border-radius: 25px;
        padding: 35px;
        box-shadow: 0 0 50px rgba(0, 240, 255, 0.25);
    }
    .progress-container {
        margin-bottom: 30px;
    }
    .step {
        text-align: center;
        font-size: 19px;
        margin-bottom: 8px;
    }
    .progress {
        height: 10px;
        background: #112233;
        border-radius: 10px;
        overflow: hidden;
    }
    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--neon), var(--purple));
        width: 20%;
        transition: width 0.5s ease;
    }

    .question {
        font-size: 26px;
        text-align: center;
        margin: 35px 0;
        line-height: 1.4;
    }
    .options {
        display: grid;
        gap: 14px;
    }
    .option-btn {
        padding: 18px 20px;
        font-size: 19px;
        background: rgba(255,255,255,0.07);
        border: 2px solid #445577;
        border-radius: 16px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
    }
    .option-btn:hover {
        background: rgba(0, 240, 255, 0.15);
        border-color: var(--neon);
    }

    .feedback {
        margin-top: 25px;
        padding: 22px;
        border-radius: 16px;
        font-size: 19px;
        line-height: 1.5;
        display: none;
    }
    .correct { background: rgba(0,180,80,0.25); border: 2px solid #00cc66; }
    .wrong  { background: rgba(200,40,40,0.25); border: 2px solid #ff4444; }

    .result-screen {
        text-align: center;
        display: none;
    }
    .score {
        font-size: 48px;
        margin: 20px 0;
    }
    .copy-btn {
        background: #00cc88;
        color: white;
        border: none;
        padding: 16px 35px;
        font-size: 19px;
        border-radius: 50px;
        cursor: pointer;
        margin-top: 25px;
    }
</style>
</head>
<body>

<div class="game-container">
    <div class="progress-container">
        <div class="step">Paso <span id="current-step">1</span> de 5</div>
        <div class="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div id="game-screen">
        <div class="question" id="question-text"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div id="result-screen" class="result-screen">
        <h1>¡Misión Completada!</h1>
        <div class="score" id="final-score"></div>
        <p id="final-message"></p>
        <button class="copy-btn" onclick="copyResult()">📋 Copiar resultado para compartir</button>
    </div>
</div>

<script>
// ====== REEMPLAZA ESTAS 5 PREGUNTAS CON LAS TUYAS ======
const questions = [
    {
        q: "¿Qué es la propaganda?",
        options: ["Información neutral y objetiva", "Mensaje diseñado para influir en las opiniones", "Solo anuncios comerciales", "Noticias verificadas por periodistas"],
        correct: 1,
        explanation: "La propaganda busca influir o manipular opiniones y conductas, no es información neutral."
    },
    {
        q: "Pregunta 2 aquí",
        options: ["Opción A", "Opción B", "Opción C", "Opción D"],
        correct: 0,
        explanation: "Explicación pedagógica cuando se equivoquen."
    },
    {
        q: "Pregunta 3 aquí",
        options: ["Opción A", "Opción B", "Opción C", "Opción D"],
        correct: 2,
        explanation: "Explicación pedagógica cuando se equivoquen."
    },
    {
        q: "Pregunta 4 aquí",
        options: ["Opción A", "Opción B", "Opción C", "Opción D"],
        correct: 1,
        explanation: "Explicación pedagógica cuando se equivoquen."
    },
    {
        q: "Pregunta 5 aquí",
        options: ["Opción A", "Opción B", "Opción C", "Opción D"],
        correct: 3,
        explanation: "Explicación pedagógica cuando se equivoquen."
    }
];

let current = 0;
let score = 0;

function loadQuestion() {
    const q = questions[current];
    document.getElementById("question-text").textContent = q.q;
    document.getElementById("current-step").textContent = current + 1;
    document.getElementById("progress-bar").style.width = ((current + 1) / 5 * 100) + "%";

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(i);
        optionsDiv.appendChild(btn);
    });

    document.getElementById("feedback").style.display = "none";
}

function checkAnswer(selected) {
    const q = questions[current];
    const feedback = document.getElementById("feedback");
    const buttons = document.querySelectorAll(".option-btn");

    buttons.forEach(b => b.disabled = true);

    if (selected === q.correct) {
        score++;
        feedback.className = "feedback correct";
        feedback.innerHTML = "✅ ¡Correcto!";
    } else {
        feedback.className = "feedback wrong";
        feedback.innerHTML = `❌ Incorrecto.<br><strong>Por qué:</strong> ${q.explanation}`;
    }
    feedback.style.display = "block";

    setTimeout(() => {
        current++;
        if (current < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }, 2600);
}

function showResult() {
    document.getElementById("game-screen").style.display = "none";
    document.getElementById("result-screen").style.display = "block";

    const percent = Math.round((score / 5) * 100);
    document.getElementById("final-score").textContent = `${score}/5 (${percent}%)`;

    let msg = score === 5 ? "¡Excelente! Eres un verdadero Detective del Contenido." :
              score >= 3 ? "Buen trabajo. Puedes mejorar aún más." :
              "Revisa los conceptos y vuelve a intentarlo.";
    document.getElementById("final-message").textContent = msg;
}

function copyResult() {
    const percent = Math.round((score / 5) * 100);
    const text = `Obtuve ${score}/5 (${percent}%) en el juego Detective del Contenido. ¡Inténtalo tú también!`;
    navigator.clipboard.writeText(text).then(() => {
        alert("✅ Resultado copiado. Pégalo en WhatsApp o Facebook.");
    });
}

// Iniciar
loadQuestion();
</script>
</body>
</html>
