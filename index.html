<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕵️ Detective del Contenido - Semana 2</title>
<style>
    body { 
        font-family: 'Segoe UI', sans-serif; 
        background: linear-gradient(135deg, #1a0f35, #0f1b4a); 
        color: white; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        min-height: 100vh;
        margin: 0;
        padding: 20px; 
    }
    header { text-align: center; margin-bottom: 20px; }
    .logo { max-width: 120px; margin-bottom: 10px; }
    h1 { font-size: 24px; color: #00f0ff; margin: 5px 0; }
    .subtitle { font-size: 16px; color: #a0d8ff; }

    /* Barra de Progreso */
    .progress-container {
        width: 100%;
        max-width: 500px;
        background: rgba(255,255,255,0.1);
        height: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        overflow: hidden;
    }
    .progress-bar {
        width: 0%;
        height: 100%;
        background: #00f0ff;
        transition: width 0.3s ease;
    }

    /* Contenedor Principal - Altura fija para evitar el error de la imagen */
    .game-container { 
        width: 100%;
        max-width: 500px; 
        min-height: 420px; 
        background: rgba(20, 25, 60, 0.95); 
        border: 2px solid #00f0ff; 
        border-radius: 15px; 
        padding: 30px; 
        box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    .question { font-size: 19px; text-align: center; margin-bottom: 20px; font-weight: 500; min-height: 60px; }
    .options { display: grid; gap: 12px; }
    .option-btn { 
        padding: 14px; 
        font-size: 15px; 
        background: rgba(45, 55, 110, 0.8); 
        border: 1px solid #5566aa; 
        border-radius: 10px; 
        color: white; 
        cursor: pointer; 
    }
    .option-btn:hover:not(:disabled) { background: rgba(0, 240, 255, 0.2); border-color: #00f0ff; }
    .option-btn:disabled { opacity: 0.6; }

    .feedback { 
        margin-top: 15px; 
        padding: 12px; 
        border-radius: 8px; 
        font-size: 14px; 
        text-align: center;
        min-height: 50px;
    }
    .correct { background: rgba(0, 220, 100, 0.2); border: 1px solid #00ff88; color: #00ff88; }
    .wrong { background: rgba(240, 60, 60, 0.2); border: 1px solid #ff6666; color: #ff6666; }

    .result-screen { text-align: center; display: none; padding: 20px 0; }
    .score { font-size: 32px; margin: 15px 0; color: #00f0ff; font-weight: bold; }
    
    .btn-group { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
    .action-btn { 
        background: #00f0ff; color: #0f1b4a; font-weight: bold; border: none; 
        padding: 12px 20px; border-radius: 25px; cursor: pointer; 
    }
    .restart-btn { background: #ffaa00; }

    /* Footer con separación real para que no se pegue al cuadro */
    footer { 
        margin-top: 50px; 
        font-size: 14px; 
        color: #ffffff; 
        text-align: center;
        width: 100%;
    }
</style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/FKz4sz2C/logoutelsinfondo.png" alt="Logo Utel" class="logo">
    <h1>🕵️ Detective del Contenido</h1>
    <div class="subtitle">Semana 2 — Análisis de Contenido</div>
</header>

<div class="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
</div>

<div class="game-container">
    <div id="game-screen">
        <div class="question" id="question-text"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback" style="display:none;"></div>
    </div>

    <div id="result-screen" class="result-screen">
        <h1>¡Misión Completada! 🎉</h1>
        <div class="score" id="final-score"></div>
        <p id="final-message"></p>
        <div class="btn-group">
            <button class="action-btn restart-btn" onclick="restartGame()">🔄 Reiniciar Juego</button>
            <button class="action-btn" onclick="shareWhatsApp()">📲 Compartir</button>
        </div>
    </div>
</div>

<footer>Universidad Utel — Dr. Armando Sandoval Maravilla</footer>

<script>
const questions = [
    { q:"1. ¿Qué es la propaganda?", options:["A) Información neutral","B) Mensaje diseñado para influir"], correct:1, explanation:"La propaganda busca persuadir o manipular opiniones." },
    { q:"2. ¿Qué significa analizar contenido?", options:["A) Revisar críticamente un mensaje","B) Memorizar sin cuestionar"], correct:0, explanation:"Analizar es cuestionar la intención detrás del mensaje." },
    { q:"3. ¿Cuál es el objetivo del pensamiento crítico?", options:["A) Aceptar todo lo que leemos","B) Evaluar la validez de la información"], correct:1, explanation:"El pensamiento crítico busca filtrar la verdad de la manipulación." },
    { q:"4. ¿Qué es un sesgo informativo?", options:["A) Una opinión objetiva","B) Una inclinación que distorsiona la realidad"], correct:1, explanation:"Los sesgos hacen que la información se presente de forma parcial." },
    { q:"5. ¿Por qué es importante el contexto?", options:["A) Porque define el sentido real del mensaje","B) No es importante, solo el texto cuenta"], correct:0, explanation:"Sin contexto, cualquier mensaje puede ser malinterpretado." }
];

let current = 0, score = 0;

function loadQuestion(){
    const q = questions[current];
    document.getElementById("question-text").textContent = q.q;
    const optionsDiv = document.getElementById("options"); 
    optionsDiv.innerHTML = "";
    
    // Actualizar barra de progreso
    const progress = (current / questions.length) * 100;
    document.getElementById("progress-bar").style.width = progress + "%";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "option-btn"; 
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(i); 
        optionsDiv.appendChild(btn);
    });
    document.getElementById("feedback").style.display = "none";
}

function checkAnswer(selected){
    const q = questions[current]; 
    const feedback = document.getElementById("feedback");
    const buttons = document.querySelectorAll(".option-btn");
    
    buttons.forEach(b => b.disabled = true);
    
    if(selected === q.correct){ 
        score++; 
        feedback.className = "feedback correct"; 
        feedback.innerHTML = "✅ <strong>¡Correcto!</strong>"; 
    } else { 
        feedback.className = "feedback wrong"; 
        feedback.innerHTML = `❌ <strong>Incorrecto</strong><br>${q.explanation}`; 
    }
    
    feedback.style.display = "block";
    
    setTimeout(() => { 
        current++; 
        if(current < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }, 2000);
}

function showResult(){
    document.getElementById("progress-bar").style.width = "100%";
    document.getElementById("game-screen").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
    document.getElementById("final-score").textContent = `${score}/${questions.length}`;
    document.getElementById("final-message").textContent = score >= 4 ? "¡Excelente nivel de análisis!" : "Repasa los conceptos e inténtalo de nuevo.";
}

function restartGame(){
    current = 0; score = 0;
    document.getElementById("result-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    loadQuestion();
}

function shareWhatsApp(){
    const text = `Obtuve ${score}/5 en el juego Detective del Contenido 🕵️‍♂️`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

loadQuestion();
</script>
</body>
</html>
